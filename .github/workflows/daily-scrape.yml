name: Daily Product Scrape

on:
  schedule:
    - cron: '0 20 * * *'   # 6:00am AEST (UTC+10) every day
  workflow_dispatch:         # Allow manual trigger from GitHub Actions UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # Needed to commit updated data files

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install -r scraper/requirements.txt

      - name: Install Chromium system dependencies (Ubuntu 24.04)
        run: |
          sudo apt-get install -y \
            libasound2t64 \
            libatk1.0-0t64 \
            libatk-bridge2.0-0t64 \
            libcups2t64 \
            libgbm1 \
            libxkbcommon0 \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libxrandr2

      - name: Install Playwright browsers
        run: playwright install chromium

      - name: Run Pass 1 — PHIS refresher
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scraper/pass1_phis.py

      - name: Run Pass 2 — nib
        if: always()
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scraper/funds/nib.py

      - name: Commit updated data files
        if: always()
        run: |
          git config user.name "New A.I.N. Bot"
          git config user.email "nikfeao@gmail.com"
          git add data/products.json data/meta.json data/nib-plans.json
          git diff --staged --quiet && echo "No changes to commit." || git commit -m "Daily product data update $(date +%Y-%m-%d)"
          git push
